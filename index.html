<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Prevent flash of light theme - Set dark mode immediately -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        // Default to dark theme if no preference is stored
        if (theme === 'dark' || !theme) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    
    <!-- Primary Meta Tags -->
    <title>AdminSuite Pro – React Admin Dashboard</title>
    <meta name="title" content="AdminSuite Pro – React Admin Dashboard" />
    <meta name="description" content="AdminSuite Pro is a modern React Admin Dashboard with analytics, charts, user management and responsive design." />
    <meta name="keywords" content="react admin dashboard, admin panel, analytics dashboard, react typescript, tailwind css, admin template" />
    <meta name="author" content="AdminSuite Pro" />
    <meta name="robots" content="index, follow" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AdminSuite Pro – React Admin Dashboard" />
    <meta property="og:description" content="AdminSuite Pro is a modern React Admin Dashboard with analytics, charts, user management and responsive design." />
    <meta property="og:site_name" content="AdminSuite Pro" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AdminSuite Pro – React Admin Dashboard" />
    <meta name="twitter:description" content="AdminSuite Pro is a modern React Admin Dashboard with analytics, charts, user management and responsive design." />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#61dafb" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
